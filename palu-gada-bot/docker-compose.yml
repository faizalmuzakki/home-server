services:
  socket-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: palu-gada-socket-proxy
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Allow read operations + start/stop/exec for docker compose management
      - CONTAINERS=1
      - IMAGES=1
      - NETWORKS=1
      - VOLUMES=1
      - INFO=1
      - EXEC=1
      - POST=1
      - ALLOW_START=1
      - ALLOW_STOP=1
      - ALLOW_RESTARTS=1
    security_opt:
      - no-new-privileges:true
    networks:
      - socket-proxy

  palu-gada-bot:
    build: .
    container_name: palu-gada-bot
    restart: unless-stopped
    depends_on:
      - socket-proxy
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      # Use the socket proxy instead of the raw Docker socket
      - DOCKER_HOST=tcp://socket-proxy:2375
    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    # Port exposure (localhost only for direct access)
    ports:
      - "127.0.0.1:3003:${API_PORT:-3003}"
    networks:
      - traefik-public
      - socket-proxy
    # Traefik labels for reverse proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.palu-gada-api.rule=Host(`bot-api.${DOMAIN}`)"
      - "traefik.http.routers.palu-gada-api.entrypoints=websecure"
      - "traefik.http.routers.palu-gada-api.tls.certresolver=cloudflare"
      - "traefik.http.routers.palu-gada-api.middlewares=secure-defaults@file"
      - "traefik.http.services.palu-gada-api.loadbalancer.server.port=${API_PORT:-3003}"
    volumes:
      # Persist SQLite database
      - ./data:/app/data
      # Optional: persist logs
      - ./logs:/app/logs
      # Mount host repo for git operations via shell channel
      - /home/solork/Projects/home-server:/host-repo
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "node -e 'require(\"http\").get(\"http://localhost:${API_PORT:-3003}/health\", (r) => {if (r.statusCode !== 200) process.exit(1)})'"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  traefik-public:
    external: true
  socket-proxy:
    internal: true
