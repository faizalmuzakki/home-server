# Traefik log rotation
# Install: sudo cp traefik/logrotate.conf /etc/logrotate.d/traefik
# Test:    sudo logrotate -d /etc/logrotate.d/traefik

/home/solork/Projects/home-server/traefik/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    # Signal Traefik to reopen log files after rotation
    postrotate
        docker kill --signal=USR1 traefik 2>/dev/null || true
    endscript
}
